name: 01 wu_trend_2026 - 驗證任務

on:
  workflow_dispatch:  # 手動觸發
  schedule:
    - cron: '0 20 * * 1,3,5'  # 每週二、四、六台灣時間早上 04:00 (UTC 20:00)

jobs:
  run-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-genai requests pyyaml beautifulsoup4

      - name: Run verify script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          cd 01_wu_trend_2026
          python 01_verify.py

      - name: Commit and push report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add 01_wu_trend_2026/report.html 01_wu_trend_2026/history.csv
          git diff --staged --quiet || git commit -m "📊 更新驗證報告 (01_wu_trend_2026) $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
